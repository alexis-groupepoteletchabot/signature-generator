<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de signature – Groupe Potel & Chabot</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background: #fff; color: #000; }
    h1 { text-align: center; color: #000; margin-bottom: 30px; }
    label { display: block; font-weight: bold; margin-top: 15px; color: #000; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .buttons { text-align: center; margin: 20px 0; }
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    .copy-btn { background: #0066cc; color: white; }
    .download-btn { background: #28a745; color: white; }
    #preview { border: 1px solid #ddd; padding: 20px; margin-top: 20px; background: #f9f9f9; min-height: 100px; }
    #customAddressField { display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Générateur de signature</h1>

  <form id="form">
    <label>Prénom</label>
    <input type="text" id="firstName" placeholder="Ex : Angèle">

    <label>Nom</label>
    <input type="text" id="lastName" placeholder="Ex : Havard">

    <label>Marque</label>
    <select id="brand">
      <option value="groupe">Groupe Potel & Chabot</option>
      <option value="potel">Potel & Chabot</option>
      <option value="dalloyau">Dalloyau</option>
    </select>

    <label>Service (optionnel)</label>
    <input type="text" id="service" placeholder="Ex : SPORTS & ENTERTAINMENT">

    <label>Poste</label>
    <input type="text" id="jobTitle" placeholder="Ex : Directrice Marketing">

    <label>Adresse</label>
    <select id="addressSelect"></select>
    
    <div id="customAddressField">
      <label>Adresse personnalisée</label>
      <input type="text" id="customAddress" placeholder="Saisissez votre adresse">
    </div>

    <label>Email</label>
    <input type="email" id="email" placeholder="prenom.nom@dalloyau.fr">

    <label>Téléphone principal</label>
    <input type="text" id="phone1" placeholder="+33 1 00 00 00 00">

    <label>Téléphone secondaire (optionnel)</label>
    <input type="text" id="phone2" placeholder="+33 6 00 00 00 00">
  </form>

  <div class="buttons">
    <button class="copy-btn" onclick="copySignature()">📋 Copier la signature</button>
    <button class="download-btn" onclick="downloadSignature()">💾 Télécharger HTML</button>
  </div>

  <div id="preview"></div>

  <script>
    var logoGroupe = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/GroupePC%20-%20600.png";
    var logoPotel = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/Potel%20-%20600.png";
    var logoDalloyau = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/Logo_Dalloyau_Mail.png";

    var addressesDalloyau = [
      { label: "Faubourg", value: "101 rue du Faubourg Saint-Honoré — PARIS VIII" },
      { label: "Sèvres", value: "22 Rue de Wolfenbuttel - 92310 Sèvres" }
    ];

    var addressesPotel = [
      { label: "Chaillot", value: "3 rue de Chaillot — PARIS XVI" },
      { label: "Pavillon Gabriel", value: "Pavillon Gabriel - 5 Av. Gabriel PARIS VIII" },
      { label: "Pavillon Vendôme", value: "Pavillon Vendôme - 7 Pl. Vendôme, PARIS I" },
      { label: "Hôtel d'Evreux", value: "Hôtel d'Evreux - 19 Pl. Vendôme, PARIS I" },
      { label: "Pavillon Cambon Capucines", value: "Pavillon Cambon Capucines - 46 Rue Cambon PARIS I" },
      { label: "Argenteuil", value: "51 rue Michel carré - 95100 Argenteuil" },
      { label: "Argenteuil Entrepôt", value: "10 avenue du Marais - 95100 Argenteuil" },
      { label: "Lausanne-Crissier", value: "Chemin de Mongevon 25, 1023 Lausanne-Crissier" }
    ];

    function updateAddressOptions() {
      var brand = document.getElementById("brand").value;
      var select = document.getElementById("addressSelect");
      var list = (brand === "dalloyau") ? [...addressesDalloyau] : [...addressesPotel];
      
      // Tri alphabétique par le label
      list.sort((a, b) => a.label.localeCompare(b.label));
      
      select.innerHTML = "";
      list.forEach(addr => {
        var opt = document.createElement("option");
        opt.value = addr.value;
        opt.textContent = addr.label;
        select.appendChild(opt);
      });
      
      var optCustom = document.createElement("option");
      optCustom.value = "custom";
      optCustom.textContent = "Autre (saisie manuelle)";
      select.appendChild(optCustom);
      
      updatePreview();
    }

    document.getElementById("brand").addEventListener("change", updateAddressOptions);
    document.getElementById("addressSelect").addEventListener("change", function() {
      document.getElementById("customAddressField").style.display = (this.value === "custom") ? "block" : "none";
      updatePreview();
    });

    function formatPhone(phone, brand) {
      if (!phone) return "";
      var cleaned = phone.replace(/[^\d+]/g, "");
      var formatted = phone;
      if (cleaned.indexOf("+33") === 0 && cleaned.length >= 12) {
        var digits = cleaned.substring(3);
        formatted = "+33 " + digits.charAt(0) + " " + digits.substring(1, 3) + " " + digits.substring(3, 5) + " " + digits.substring(5, 7) + " " + digits.substring(7, 9);
      }
      if (brand === "dalloyau" && formatted.includes("+33")) {
        formatted = formatted.replace("+33", "(+33)");
      }
      return formatted;
    }

    function updatePreview() {
      var firstName = document.getElementById("firstName").value || "PRÉNOM";
      var lastName = document.getElementById("lastName").value || "NOM";
      var brand = document.getElementById("brand").value;
      var jobTitle = document.getElementById("jobTitle").value || "Poste";
      var service = document.getElementById("service").value;
      var email = document.getElementById("email").value || "prenom.nom@dalloyau.fr";
      var address = (document.getElementById("addressSelect").value === "custom") ? document.getElementById("customAddress").value : document.getElementById("addressSelect").value;
      var phone1 = document.getElementById("phone1").value;
      var phone2 = document.getElementById("phone2").value;

      var html = "";
      if (brand === "dalloyau") {
        var phones = "";
        if (phone1 && phone2) phones = formatPhone(phone1, "dalloyau") + " — " + formatPhone(phone2, "dalloyau");
        else if (phone1 || phone2) phones = formatPhone(phone1 || phone2, "dalloyau");

        html = '<table cellpadding="0" cellspacing="0" border="0" style="max-width:650px; border-collapse:collapse;">' +
               '<tr><td style="vertical-align:middle; padding-right:15px; width:180px;">' +
               '<img src="' + logoDalloyau + '" width="180" style="display:block; border:none;"></td>' +
               '<td style="width:1px; background-color:#000000; padding:0;"><div style="width:1px; height:80px;"></div></td>' +
               '<td style="vertical-align:middle; padding-left:15px; color:#000000; font-family:Arial, sans-serif;">' +
               '<div style="font-family:\'Times New Roman\', Times, serif; font-size:16pt; font-style:italic; margin:0;">' + firstName + ' ' + lastName + '</div>' +
               '<div style="font-size:10pt; margin-top:2px;">' + jobTitle + (service ? " - " + service : "") + '</div>' +
               '<div style="font-size:10pt; margin-top:2px;">' + address + '</div>' +
               '<div style="font-size:10pt; margin-top:2px;"><a href="mailto:' + email + '" style="color:#000000; text-decoration:none;">' + email + '</a></div>' +
               (phones ? '<div style="font-size:10pt; margin-top:2px;">' + phones + '</div>' : '') +
               '</td></tr></table>';
      } else {
          // Logique simplifiée pour Potel/Groupe pour l'exemple
          html = '<div style="font-family:Arial; font-size:10pt;"><strong>' + firstName.toUpperCase() + ' ' + lastName.toUpperCase() + '</strong><br>' + jobTitle + '<br>' + address + '</div>';
      }
      document.getElementById("preview").innerHTML = html;
    }

    async function copySignature() {
      var html = document.getElementById("preview").innerHTML;
      try {
        var blob = new Blob([html], { type: 'text/html' });
        var clipboardItem = new ClipboardItem({ 'text/html': blob });
        await navigator.clipboard.write([clipboardItem]);
        alert("✅ Signature copiée !");
      } catch (e) {
        alert("❌ Erreur de copie automatique.");
      }
    }

    function downloadSignature() {
      var html = document.getElementById("preview").innerHTML;
      var fullHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + html + '</body></html>';
      var blob = new Blob([fullHtml], { type: 'text/html' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'signature.html';
      a.click();
    }

    var inputs = document.querySelectorAll("input");
    inputs.forEach(i => i.addEventListener("input", updatePreview));
    
    // Initialisation
    updateAddressOptions();
  </script>
</body>
</html>
