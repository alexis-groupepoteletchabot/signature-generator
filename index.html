<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de signature – Groupe Potel & Chabot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      color: #000;
    }
    h1 {
      text-align: center;
      color: #000;
      margin-bottom: 30px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-top: 15px;
      color: #000;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .buttons {
      text-align: center;
      margin: 20px 0;
    }
    button {
      padding: 12px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .copy-btn {
      background: #0066cc;
      color: white;
    }
    .outlook-web-btn {
      background: #0078d4;
      color: white;
    }
    .outlook-app-btn {
      background: #106ebe;
      color: white;
    }
    .download-btn {
      background: #28a745;
      color: white;
    }
    #preview {
      border: 1px solid #ddd;
      padding: 20px;
      margin-top: 20px;
      background: #f9f9f9;
      min-height: 100px;
    }
    .instructions {
      background: #e6f3ff;
      padding: 15px;
      border-radius: 5px;
      margin: 20px 0;
    }
    #customAddressField {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Générateur de signature</h1>

  <form id="form">
    <label>Prénom</label>
    <input type="text" id="firstName" placeholder="Ex : Angèle">

    <label>Nom</label>
    <input type="text" id="lastName" placeholder="Ex : Havard">

    <label>Marque</label>
    <select id="brand">
      <option value="groupe">Groupe Potel & Chabot</option>
      <option value="potel">Potel & Chabot</option>
      <option value="dalloyau">Dalloyau</option>
    </select>

    <label>Service (optionnel)</label>
    <input type="text" id="service" placeholder="Ex : SPORTS & ENTERTAINMENT">

    <label>Poste</label>
    <input type="text" id="jobTitle" placeholder="Ex : Directrice Marketing">

    <label>Adresse</label>
    <select id="addressSelect">
      <option value="101 rue du Faubourg Saint-Honoré — PARIS VIII">Dalloyau - Faubourg St-Honoré</option>
      <option value="3 rue de Chaillot — PARIS XVI">Chaillot</option>
      <option value="Pavillon Gabriel - 5 Av. Gabriel PARIS VIII">Pavillon Gabriel</option>
      <option value="Pavillon Vendôme - 7 Pl. Vendôme, PARIS I">Pavillon Vendôme</option>
      <option value="Hôtel d'Evreux - 19 Pl. Vendôme, PARIS I">Hôtel d'Evreux</option>
      <option value="Pavillon Cambon Capucines - 46 Rue Cambon PARIS I">Pavillon Cambon Capucines</option>
      <option value="51 rue Michel carré - 95100 Argenteuil">Argenteuil</option>
      <option value="10 avenue du Marais - 95100 Argenteuil">Argenteuil Entrepôt</option>
      <option value="Chemin de Mongevon 25, 1023 Lausanne-Crissier">Lausanne-Crissier</option>
      <option value="custom">Autre (saisie manuelle)</option>
    </select>
    
    <div id="customAddressField">
      <label>Adresse personnalisée</label>
      <input type="text" id="customAddress" placeholder="Saisissez votre adresse">
    </div>

    <label>Email</label>
    <input type="email" id="email" placeholder="prenom.nom@dalloyau.fr">

    <label>Téléphone principal</label>
    <input type="text" id="phone1" placeholder="+33 1 00 00 00 00">

    <label>Téléphone secondaire (optionnel)</label>
    <input type="text" id="phone2" placeholder="+33 6 00 00 00 00">
  </form>

  <div class="buttons">
    <button class="copy-btn" onclick="copySignature()">📋 Copier la signature</button>
    <button class="download-btn" onclick="downloadSignature()">💾 Télécharger HTML</button>
    <button class="outlook-web-btn" onclick="openOutlookWeb()">🌐 Ouvrir Outlook Web</button>
    <button class="outlook-app-btn" onclick="openOutlookApp()">📧 Ouvrir l'app Outlook</button>
  </div>

  <div class="instructions">
    <strong>Instructions :</strong> Remplissez le formulaire, copiez votre signature, puis collez-la dans Outlook.
  </div>

  <div id="preview">
    <p>Votre signature apparaîtra ici...</p>
  </div>

  <script>
    var logoGroupe = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/GroupePC%20-%20600.png";
    var logoPotel = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/Potel%20-%20600.png";
    var logoDalloyau = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/Logo_Dalloyau_Mail.png";

    document.getElementById("addressSelect").addEventListener("change", function() {
      var customField = document.getElementById("customAddressField");
      customField.style.display = (this.value === "custom") ? "block" : "none";
      updatePreview();
    });

    function formatPhone(phone, brand) {
      if (!phone) return "";
      var cleaned = phone.replace(/[^\d+]/g, "");
      var formatted = phone;
      
      if (cleaned.indexOf("+33") === 0) {
        var digits = cleaned.substring(3);
        if (digits.length >= 9) {
          formatted = "+33 " + digits.charAt(0) + " " + digits.substring(1, 3) + " " + 
                      digits.substring(3, 5) + " " + digits.substring(5, 7) + " " + digits.substring(7, 9);
        }
      } else if (cleaned.indexOf("0") === 0 && cleaned.length >= 10) {
        formatted = cleaned.substring(0, 2) + " " + cleaned.substring(2, 4) + " " + 
                    cleaned.substring(4, 6) + " " + cleaned.substring(6, 8) + " " + cleaned.substring(8, 10);
      }
      
      // Dalloyau utilise des parenthèses sur le code pays selon le modèle
      if (brand === "dalloyau" && formatted.indexOf("+33") === 0) {
          formatted = formatted.replace("+33", "(+33)");
      }
      
      return formatted;
    }

    function getAddress() {
      var addressSelect = document.getElementById("addressSelect").value;
      if (addressSelect === "custom") {
        return document.getElementById("customAddress").value || "Adresse";
      }
      return addressSelect;
    }

    function updatePreview() {
      var firstName = document.getElementById("firstName").value || "PRÉNOM";
      var lastName = document.getElementById("lastName").value || "NOM";
      var brand = document.getElementById("brand").value;
      var service = document.getElementById("service").value;
      var jobTitle = document.getElementById("jobTitle").value || "Poste";
      var address = getAddress();
      var email = document.getElementById("email").value || "email@exemple.com";
      var phone1 = document.getElementById("phone1").value;
      var phone2 = document.getElementById("phone2").value;

      var html = "";
      
      if (brand === "groupe") {
        // --- STYLE GROUPE ---
        var firstNameUpper = firstName.toUpperCase();
        var lastNameUpper = lastName.toUpperCase();
        var phones = "";
        if (phone1 && phone2) {
          phones = formatPhone(phone1, brand) + " — " + formatPhone(phone2, brand);
        } else if (phone1 || phone2) {
          phones = formatPhone(phone1 || phone2, brand);
        }

        var serviceHtml = "";
        if (service.trim()) {
          serviceHtml = '<div style="display:inline-block; background:#000000; color:#ffffff; font-size:10pt; font-weight:bold; text-transform:uppercase; padding:4px 8px; margin-top:1px; letter-spacing:0px;">' + service.trim().toUpperCase() + '</div>';
        }

        html = '<div style="font-family:Arial, sans-serif; font-size:10pt; color:#000000 !important; max-width:600px; line-height:1.2;">' +
               '<div style="font-size:10pt; font-weight:bold; color:#000000 !important; margin:0; padding:0; margin-bottom:1px;">' + firstNameUpper + ' ' + lastNameUpper + '</div>' +
               serviceHtml +
               '<div style="font-size:10pt; font-weight:bold; color:#000000 !important; margin:0; padding:0; margin-top:1px; margin-bottom:10px;">' + jobTitle.toUpperCase() + '</div>' +
               (phones ? '<div style="font-size:10pt; font-weight:bold; color:#000000 !important; margin:0; padding:0; margin-bottom:1px;">' + phones + '</div>' : '') +
               '<div style="font-size:10pt; font-weight:bold; color:#000000 !important; margin:0; padding:0; margin-top:1px; margin-bottom:1px;"><span style="color:#000000 !important; text-decoration:none;">' + email + '</span></div>' +
               '<div style="font-size:10pt; font-weight:bold; color:#000000 !important; margin:0; padding:0; margin-top:1px;">' + address + '</div>' +
               '<table style="margin-top:10px; margin-bottom:0; border-collapse:collapse;" cellpadding="0" cellspacing="0" border="0"><tr><td style="background-color:#ffffff; padding:2px 2px 2px 0;"><img src="' + logoGroupe + '" alt="Groupe Potel & Chabot" style="display:block; border:none; width:250px;" width="250"></td></tr></table>' +
               '</div>';

      } else if (brand === "dalloyau") {
        // --- STYLE DALLOYAU ---
        var nameStyle = 'font-family:"Times New Roman", Times, serif; font-size:16pt; font-style:italic; color:#000000 !important;';
        var textStyle = 'font-family:Arial, sans-serif; font-size:10pt; color:#000000 !important;';
        
        var phoneLine = "";
        if (phone1 && phone2) {
            phoneLine = formatPhone(phone1, "dalloyau") + " — " + formatPhone(phone2, "dalloyau");
        } else if (phone1 || phone2) {
            phoneLine = formatPhone(phone1 || phone2, "dalloyau");
        }

        html = '<table style="max-width:650px; border-collapse:collapse;" cellpadding="0" cellspacing="0" border="0">' +
               '<tr>' +
               '<td style="vertical-align:middle; padding-right:15px; width:180px;">' +
               '<img src="' + logoDalloyau + '" alt="Dalloyau" style="display:block; border:none; width:180px; height:auto;" width="180">' +
               '</td>' +
               '<td style="width:1px; background-color:#000000; padding:0;"><div style="width:1px; height:80px; background-color:#000000;"></div></td>' +
               '<td style="vertical-align:middle; padding-left:15px;">' +
               '<div style="' + nameStyle + ' margin:0;">' + firstName + ' ' + lastName + '</div>' +
               '<div style="' + textStyle + ' margin-top:2px;">' + jobTitle + (service ? " - " + service : "") + '</div>' +
               '<div style="' + textStyle + ' margin-top:2px;">' + address + '</div>' +
               '<div style="' + textStyle + ' margin-top:2px;"><a href="mailto:' + email + '" style="color:#000000; text-decoration:none;">' + email + '</a></div>' +
               (phoneLine ? '<div style="' + textStyle + ' margin-top:2px;">' + phoneLine + '</div>' : '') +
               '</td></tr></table>';

      } else {
        // --- STYLE POTEL ---
        var phones = "";
        if (phone1 && phone2) {
          phones = formatPhone(phone1, brand) + " — " + formatPhone(phone2, brand);
        } else if (phone1 || phone2) {
          phones = formatPhone(phone1 || phone2, brand);
        }
        
        var emailLine = email;
        var phonesLine = "";
        if (phone1 && phone2) {
          phonesLine = '<div style="font-size:10pt; color:#000000 !important; margin:0; padding:0; margin-top:3px;">' + phones + '</div>';
        } else if (phone1 || phone2) {
          emailLine = email + " — " + phones;
        }

        html = '<table style="width:100%; max-width:650px; border-collapse:collapse; font-family:Times, serif; font-size:10pt; color:#000000;" cellpadding="0" cellspacing="0" border="0">' +
               '<tr>' +
               '<td style="vertical-align:middle; padding-right:12px; width:180px; padding:0;">' +
               '<img src="' + logoPotel + '" alt="Potel & Chabot" style="display:block; border:none; width:180px; height:auto;" width="180">' +
               '</td>' +
               '<td style="width:1px; background-color:#000000; vertical-align:middle; padding:0;"><div style="width:1px; height:60px; background-color:#000000;"></div></td>' +
               '<td style="vertical-align:middle; padding-left:12px;">' +
               '<div style="font-size:12pt; font-weight:normal; color:#000000 !important; margin:0;">' + firstName.toUpperCase() + ' ' + lastName.toUpperCase() + '</div>' +
               '<div style="font-size:10pt; color:#000000 !important; margin-top:2px;">' + jobTitle + (service ? " — " + service : "") + '</div>' +
               '<div style="font-size:10pt; color:#000000 !important; margin-top:3px;">' + address + '</div>' +
               '<div style="font-size:10pt; color:#000000 !important; margin-top:3px;"><span style="color:#000000 !important; text-decoration:none;">' + emailLine + '</span></div>' +
               phonesLine +
               '</td></tr></table>';
      }

      document.getElementById("preview").innerHTML = html;
    }

    async function copySignature() {
      var html = document.getElementById("preview").innerHTML;
      try {
        var blob = new Blob([html], { type: 'text/html' });
        var clipboardItem = new ClipboardItem({ 'text/html': blob });
        await navigator.clipboard.write([clipboardItem]);
        alert("✅ Signature copiée avec formatage !");
      } catch (e) {
        alert("❌ Erreur de copie. Veuillez sélectionner et copier l'aperçu manuellement.");
      }
    }

    function downloadSignature() {
      var html = document.getElementById("preview").innerHTML;
      var fullHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + html + '</body></html>';
      var blob = new Blob([fullHtml], { type: 'text/html' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'signature.html';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function openOutlookWeb() { window.open("https://outlook.office.com/mail/options/mail/messageFormat", '_blank'); }
    function openOutlookApp() { window.location.href = "outlook:"; }

    var inputs = document.querySelectorAll("input, select");
    inputs.forEach(input => {
      input.addEventListener("input", updatePreview);
      input.addEventListener("change", updatePreview);
    });

    updatePreview();
  </script>
</body>
</html>
