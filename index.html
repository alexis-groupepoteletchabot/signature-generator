<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de signature – Groupe Potel & Chabot</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background: #fff; color: #000; }
    h1 { text-align: center; color: #000; margin-bottom: 30px; }
    label { display: block; font-weight: bold; margin-top: 15px; color: #000; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .buttons { text-align: center; margin: 20px 0; }
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    .copy-btn { background: #0066cc; color: white; }
    .download-btn { background: #28a745; color: white; }
    #preview { border: 1px solid #ddd; padding: 20px; margin-top: 20px; background: #f9f9f9; min-height: 100px; overflow-x: auto; }
    #customAddressField { display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Générateur de signature</h1>

  <form id="form">
    <label>Prénom</label>
    <input type="text" id="firstName" placeholder="Ex : Angèle">
    <label>Nom</label>
    <input type="text" id="lastName" placeholder="Ex : Havard">

    <label>Marque</label>
    <select id="brand">
      <option value="groupe">Groupe Potel & Chabot</option>
      <option value="potel">Potel & Chabot</option>
      <option value="dalloyau">Dalloyau</option>
    </select>

    <label>Service (optionnel)</label>
    <input type="text" id="service" placeholder="Ex : SPORTS & ENTERTAINMENT">
    <label>Poste</label>
    <input type="text" id="jobTitle" placeholder="Ex : Directrice Marketing">

    <label>Adresse</label>
    <select id="addressSelect"></select>
    <div id="customAddressField">
      <label>Adresse personnalisée</label>
      <input type="text" id="customAddress" placeholder="Saisissez votre adresse">
    </div>

    <label>Email</label>
    <input type="email" id="email" placeholder="prenom.nom@dalloyau.fr">
    <label>Téléphone principal</label>
    <input type="text" id="phone1" placeholder="+33 1 00 00 00 00">
    <label>Téléphone secondaire (optionnel)</label>
    <input type="text" id="phone2" placeholder="+33 6 00 00 00 00">
  </form>

  <div class="buttons">
    <button class="copy-btn" onclick="copySignature()">📋 Copier la signature</button>
    <button class="download-btn" onclick="downloadSignature()">💾 Télécharger HTML</button>
  </div>

  <div id="preview"></div>

  <script>
    const logoGroupe = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/GroupePC%20-%20600.png";
    const logoPotel = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/Potel%20-%20600.png";
    const logoDalloyau = "https://pub-931fda2ddb7a4c2bbec8e89d1253445c.r2.dev/Logo_Dalloyau_Mail.png";

    const addressesDalloyau = [
      { label: "Faubourg", value: "101 rue du Faubourg-Saint-Honoré — PARIS VIII" },
      { label: "Sèvres", value: "22 Rue de Wolfenbuttel - 92310 Sèvres" }
    ];

    const addressesPotel = [
      { label: "Chaillot", value: "3 rue de Chaillot — PARIS XVI" },
      { label: "Pavillon Gabriel", value: "Pavillon Gabriel - 5 Av. Gabriel PARIS VIII" },
      { label: "Pavillon Vendôme", value: "Pavillon Vendôme - 7 Pl. Vendôme, PARIS I" },
      { label: "Hôtel d'Evreux", value: "Hôtel d'Evreux - 19 Pl. Vendôme, PARIS I" },
      { label: "Pavillon Cambon Capucines", value: "Pavillon Cambon Capucines - 46 Rue Cambon PARIS I" },
      { label: "Argenteuil", value: "51 rue Michel carré - 95100 Argenteuil" },
      { label: "Argenteuil Entrepôt", value: "10 avenue du Marais - 95100 Argenteuil" },
      { label: "Lausanne-Crissier", value: "Chemin de Mongevon 25, 1023 Lausanne-Crissier" }
    ];

    function updateAddressOptions() {
      const brand = document.getElementById("brand").value;
      const select = document.getElementById("addressSelect");
      const list = (brand === "dalloyau") ? [...addressesDalloyau] : [...addressesPotel];
      list.sort((a, b) => a.label.localeCompare(b.label));
      
      select.innerHTML = "";
      list.forEach(addr => {
        const opt = document.createElement("option");
        opt.value = addr.value;
        opt.textContent = addr.label;
        select.appendChild(opt);
      });
      
      const optCustom = document.createElement("option");
      optCustom.value = "custom";
      optCustom.textContent = "Autre (saisie manuelle)";
      select.appendChild(optCustom);
      updatePreview();
    }

    function formatPhone(phone, brand) {
      if (!phone) return "";
      let cleaned = phone.replace(/[^\d+]/g, "");
      let formatted = phone;
      if (cleaned.startsWith("+33") && cleaned.length >= 12) {
        let d = cleaned.substring(3);
        formatted = "+33 " + d[0] + " " + d.substring(1,3) + " " + d.substring(3,5) + " " + d.substring(5,7) + " " + d.substring(7,9);
      } else if (cleaned.startsWith("0") && cleaned.length >= 10) {
        formatted = cleaned.substring(0,2) + " " + cleaned.substring(2,4) + " " + cleaned.substring(4,6) + " " + cleaned.substring(6,8) + " " + cleaned.substring(8,10);
      }
      return (brand === "dalloyau" && formatted.includes("+33")) ? formatted.replace("+33", "(+33)") : formatted;
    }

    function updatePreview() {
      const firstName = document.getElementById("firstName").value || "PRÉNOM";
      const lastName = document.getElementById("lastName").value || "NOM";
      const brand = document.getElementById("brand").value;
      const service = document.getElementById("service").value;
      const jobTitle = document.getElementById("jobTitle").value || "Poste";
      const email = document.getElementById("email").value || "prenom.nom@dalloyau.fr";
      const address = (document.getElementById("addressSelect").value === "custom") ? document.getElementById("customAddress").value : document.getElementById("addressSelect").value;
      const phone1 = document.getElementById("phone1").value;
      const phone2 = document.getElementById("phone2").value;

      let html = "";
      if (brand === "dalloyau") {
        const phones = (phone1 && phone2) ? formatPhone(phone1, "dalloyau") + " — " + formatPhone(phone2, "dalloyau") : formatPhone(phone1 || phone2, "dalloyau");
        
        html = `
        <table cellpadding="0" cellspacing="0" border="0" style="width: 100%; max-width: 600px; border-collapse: collapse;">
          <tr>
            <td style="vertical-align: middle; padding-right: 15px; width: 180px;">
              <img src="${logoDalloyau}" width="180" style="display: block; width: 180px; max-width: 100%; height: auto; border: 0;">
            </td>
            <td style="width: 1px; background-color: #000000; padding: 0;"><div style="width: 1px; height: 80px; background-color: #000000;"></div></td>
            <td style="vertical-align: middle; padding-left: 15px; color: #000000; font-family: Arial, sans-serif;">
              <div style="font-family: 'Times New Roman', Times, serif; font-size: 16pt; font-style: italic; margin: 0; line-height: 1.2;">${firstName} ${lastName}</div>
              <div style="font-size: 10pt; margin-top: 2px; line-height: 1.2;">${jobTitle}${service ? " - " + service : ""}</div>
              <div style="font-size: 10pt; margin-top: 2px; line-height: 1.2;">${address}</div>
              <div style="font-size: 10pt; margin-top: 2px; line-height: 1.2;"><a href="mailto:${email}" style="color: #000000; text-decoration: none;">${email}</a></div>
              ${phones ? `<div style="font-size: 10pt; margin-top: 2px; line-height: 1.2;">${phones}</div>` : ""}
            </td>
          </tr>
        </table>`;
      } else if (brand === "potel") {
        const phones = (phone1 && phone2) ? formatPhone(phone1, brand) + " — " + formatPhone(phone2, brand) : formatPhone(phone1 || phone2, brand);
        html = `
        <table style="width: 100%; max-width: 600px; border-collapse: collapse; font-family: Times, serif; font-size: 10pt; color: #000000;" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="vertical-align: middle; width: 180px; padding: 0;"><img src="${logoPotel}" width="180" style="display: block; max-width: 100%; height: auto;"></td>
            <td style="width: 1px; background-color: #000000;"><div style="width: 1px; height: 60px;"></div></td>
            <td style="vertical-align: middle; padding-left: 12px;">
              <div style="font-size: 12pt;">${firstName.toUpperCase()} ${lastName.toUpperCase()}</div>
              <div style="margin-top: 2px;">${jobTitle}${service ? " — " + service : ""}</div>
              <div style="margin-top: 3px;">${address}</div>
              <div style="margin-top: 3px;"><span style="text-decoration: none; color: #000000;">${email}${(!phone2 && phone1) ? " — " + formatPhone(phone1, brand) : ""}</span></div>
              ${(phone1 && phone2) ? `<div style="margin-top: 3px;">${phones}</div>` : ""}
            </td>
          </tr>
        </table>`;
      } else {
        const phones = (phone1 && phone2) ? formatPhone(phone1, brand) + " — " + formatPhone(phone2, brand) : formatPhone(phone1 || phone2, brand);
        html = `
        <div style="font-family: Arial, sans-serif; font-size: 10pt; color: #000000; line-height: 1.2;">
          <div style="font-weight: bold;">${firstName.toUpperCase()} ${lastName.toUpperCase()}</div>
          ${service ? `<div style="display: inline-block; background: #000; color: #fff; padding: 4px 8px; font-weight: bold; margin: 2px 0;">${service.toUpperCase()}</div>` : ""}
          <div style="font-weight: bold; margin-bottom: 8px;">${jobTitle.toUpperCase()}</div>
          ${phones ? `<div style="font-weight: bold;">${phones}</div>` : ""}
          <div style="font-weight: bold;">${email}</div>
          <div style="font-weight: bold;">${address}</div>
          <div style="margin-top: 10px;"><img src="${logoGroupe}" width="250" style="display: block; max-width: 100%; height: auto;"></div>
        </div>`;
      }
      document.getElementById("preview").innerHTML = html;
    }

    async function copySignature() {
      const html = document.getElementById("preview").innerHTML;
      try {
        const blob = new Blob([html], { type: 'text/html' });
        const item = new ClipboardItem({ 'text/html': blob });
        await navigator.clipboard.write([item]);
        alert("✅ Signature copiée avec formatage !");
      } catch (e) { alert("❌ Erreur. Copiez manuellement l'aperçu."); }
    }

    function downloadSignature() {
      const html = document.getElementById("preview").innerHTML;
      const blob = new Blob(['<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + html + '</body></html>'], { type: 'text/html' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'signature.html'; a.click();
    }

    document.getElementById("brand").addEventListener("change", updateAddressOptions);
    document.getElementById("addressSelect").addEventListener("change", function() {
      document.getElementById("customAddressField").style.display = (this.value === "custom") ? "block" : "none";
      updatePreview();
    });
    document.querySelectorAll("input").forEach(i => i.addEventListener("input", updatePreview));
    updateAddressOptions();
  </script>
</body>
</html>
